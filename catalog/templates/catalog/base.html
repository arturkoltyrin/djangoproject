{% extends 'home.html'%}
{% block content %}
{% load my_tags_blog %}
<div class="container">
    <div class="row text-center">
        {% for product in products %}
        <div class="col-3">
            <div class="card mb-4 box-shadow">
                <div class="card-header">
                    <h4 class="my-0 font-weight-normal">{{ product.name }}</h4>
                </div>
                <div class="card-body">
                    <img src = "{{product.photo | media_filter}}" class = "card-img-top" alt="{{product.name}}">
                    <h1 class="card-title pricing-card-title">$ {{ product.purchase_price }}</h1>
                    <ul class="list-unstyled mt-3 mb-4 text-start m-3">
                        <li>- {{ product.description|truncatechars:100 }}</li>
                    </ul>
                    <div class="btn-group">
                      <a class="btn btn-primary" href="{% url 'catalog:product_detail' product.pk %}">Подробно</a>
                    </div>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
{% endblock %}
